<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Dashboard</title>
    <!-- Tailwind CSS (via CDN snippet for zero-install configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for beautiful standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <i class="fa-solid fa-layer-group text-indigo-600 text-2xl mr-2"></i>
                        <span class="font-bold text-xl text-gray-900 tracking-tight">AdminSaaS</span>
                    </div>
                </div>
                <div class="flex items-center relative">
                    <button class="flex items-center gap-2 hover:bg-gray-50 p-2 rounded-lg transition-colors border border-transparent hover:border-gray-200">
                        <img class="h-8 w-8 rounded-full ring-2 ring-indigo-50" src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="Admin">
                        <span class="text-sm font-medium text-gray-700 hidden sm:block">Admin User</span>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-xs ml-1 hidden sm:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        
        <!-- Page Header -->
        <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Users Management</h1>
                <p class="mt-1 text-sm text-gray-500">Manage all users across your platform.</p>
            </div>
            <div class="mt-4 sm:mt-0">
                <a href="/signup" class="inline-flex items-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200 hover:shadow-md">
                    <i class="fa-solid fa-plus mr-2 text-xs"></i> Add New User
                </a>
            </div>
        </div>

        <!-- Dashboard Card -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all duration-200 hover:shadow-md">
            <!-- Header inside card -->
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <div class="flex items-center space-x-2">
                    <div class="h-8 w-8 rounded bg-indigo-50 text-indigo-600 flex items-center justify-center">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <h3 class="text-lg leading-6 font-semibold text-gray-900">Users Directory</h3>
                </div>
            </div>

            <!-- Thymeleaf Switch on users -->
            <div th:switch="${users}" class="p-0">
                
                <!-- Empty State -->
                <div th:case="null" class="text-center py-16 px-4 sm:px-6 bg-gray-50/30">
                     <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 mb-4 shadow-sm border border-indigo-100">
                        <i class="fa-regular fa-folder-open text-2xl text-indigo-500"></i>
                    </div>
                    <h3 class="text-base font-semibold text-gray-900">No users found</h3>
                    <p class="mt-2 text-sm text-gray-500 max-w-sm mx-auto">Get started by creating a new user to populate your directory and manage access.</p>
                </div>

                <!-- Data Table -->
                <div th:case="*" class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">User</th>
                                <th scope="col" class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Contact</th>
                                <th scope="col" class="px-6 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-100">
                            <!-- User Iteration -->
                            <tr th:each="user : ${users}" class="hover:bg-gray-50 transition-colors duration-200 group">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="flex-shrink-0 h-10 w-10">
                                            <div class="h-10 w-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 border border-indigo-100 shadow-sm">
                                                <i class="fa-regular fa-user"></i>
                                            </div>
                                        </div>
                                        <div class="ml-4">
                                            <div class="text-sm font-semibold text-gray-900" th:text="${user.name}">John Doe</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-600 flex items-center bg-gray-50 px-3 py-1.5 rounded-md inline-flex border border-gray-100">
                                        <div class="text-gray-400 mr-2"><i class="fa-regular fa-envelope"></i></div>
                                        <span th:text="${user.email}">user@example.com</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <div class="flex justify-end space-x-2 opacity-80 group-hover:opacity-100 transition-opacity">
                                        <a th:href="@{/edit/{id}(id=${user.id})}" title="Edit User" class="text-gray-500 hover:text-indigo-600 inline-flex items-center justify-center w-8 h-8 rounded-md hover:bg-indigo-50 transition-colors duration-200 border border-transparent hover:border-indigo-100">
                                            <i class="fa-solid fa-pen"></i>
                                        </a>
                                        <a th:href="@{/delete/{id}(id=${user.id})}" title="Delete User" class="text-gray-500 hover:text-red-600 inline-flex items-center justify-center w-8 h-8 rounded-md hover:bg-red-50 transition-colors duration-200 border border-transparent hover:border-red-100">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- Table Footer -->
                    <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                        <div class="text-xs text-gray-500 flex items-center font-medium">
                            <i class="fa-solid fa-circle-check text-green-500 mr-2"></i> All systems operational
                        </div>
                    </div>
                </div>
                
            </div>
            
        </div>
    </main>
</body>
</html>
