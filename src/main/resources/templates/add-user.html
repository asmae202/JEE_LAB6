<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <!-- Tailwind CSS (via CDN snippet for zero-install configuration) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center hover:opacity-80 transition-opacity">
                        <i class="fa-solid fa-layer-group text-indigo-600 text-2xl mr-2"></i>
                        <span class="font-bold text-xl text-gray-900 tracking-tight">AdminSaaS</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl">
            <!-- Header -->
            <div class="px-8 py-6 border-b border-gray-100 bg-white">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Add New User</h2>
                    <div class="h-10 w-10 flex items-center justify-center rounded-full bg-indigo-50 text-indigo-600 border border-indigo-100 shadow-sm">
                        <i class="fa-solid fa-user-plus"></i>
                    </div>
                </div>
                <p class="text-sm text-gray-500">Provide the user's basic information below.</p>
            </div>
            
            <!-- Form Body -->
            <div class="px-8 py-8 bg-gray-50/30">
                <form action="#" th:action="@{/adduser}" th:object="${user}" method="post" class="space-y-6">
                    
                    <!-- Name input -->
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
                        <div class="relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <i class="fa-regular fa-user text-gray-400"></i>
                            </div>
                            <input type="text" th:field="*{name}" id="name" placeholder="E.g. Jane Doe" 
                                class="mt-1 block w-full pl-11 pr-3 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200">
                        </div>
                        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-2 text-sm text-red-500 flex items-center font-medium">
                            <i class="fa-solid fa-circle-exclamation mr-1.5"></i> Error message
                        </span>
                    </div>

                    <!-- Email input -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
                        <div class="relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                <i class="fa-regular fa-envelope text-gray-400"></i>
                            </div>
                            <input type="text" th:field="*{email}" id="email" placeholder="jane@example.com"
                                class="mt-1 block w-full pl-11 pr-3 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all duration-200">
                        </div>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="mt-2 text-sm text-red-500 flex items-center font-medium">
                            <i class="fa-solid fa-circle-exclamation mr-1.5"></i> Error message
                        </span>
                    </div>

                    <hr class="border-gray-200 my-6">

                    <!-- Actions -->
                    <div class="pt-2 flex justify-end space-x-3">
                        <a href="/" class="inline-flex justify-center py-2.5 px-4 border border-gray-300 shadow-sm text-sm font-semibold rounded-lg text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                            Cancel
                        </a>
                        <button type="submit" class="inline-flex flex-row-reverse justify-center items-center py-2.5 px-6 border border-transparent shadow-sm text-sm font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                            <i class="fa-solid fa-arrow-right ml-2 text-xs"></i> <span>Add User</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
